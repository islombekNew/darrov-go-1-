name: DarrovGo Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  # ─── DEBUG APK ────────────────────────────────────────────────────────────────
  # Runs automatically on every push to main. No secrets needed.
  debug-apk:
    name: Debug APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.build_type == 'debug'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DarrovGo-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ─── RELEASE AAB (Play Store) ─────────────────────────────────────────────────
  # Triggered manually: Actions tab → "Run workflow" → build_type: release
  # Requires GitHub Secrets (see README below):
  #   ANDROID_KEYSTORE_BASE64   – keystore file encoded as base64
  #   ANDROID_KEY_ALIAS         – key alias inside the keystore
  #   ANDROID_STORE_PASSWORD    – keystore store password
  #   ANDROID_KEY_PASSWORD      – key password
  #   EXPO_PUBLIC_GEMINI_KEY    – Gemini API key
  release-aab:
    name: Release AAB (Play Store)
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]       && missing="$missing ANDROID_KEY_ALIAS"
          [ -z "${{ secrets.ANDROID_STORE_PASSWORD }}" ]  && missing="$missing ANDROID_STORE_PASSWORD"
          [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]    && missing="$missing ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing GitHub Secrets:$missing"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "All secrets present"

      - name: Expo Prebuild
        env:
          EXPO_PUBLIC_GEMINI_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_KEY }}
        run: npx expo prebuild --platform android --no-install

      - name: Build Release AAB
        env:
          EXPO_PUBLIC_GEMINI_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_KEY }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --stacktrace

      - name: Sign Release AAB
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '34.0.0'

      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: DarrovGo-release-${{ github.run_number }}
          path: ${{ steps.sign.outputs.signedReleaseFile }}
          retention-days: 30
