name: Android APK Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias darrovgo \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass darrovgo123 -keypass darrovgo123 \
            -dname "CN=DarrovGo, OU=App, O=DarrovGo, L=Tashkent, S=Tashkent, C=UZ"

      - name: Build Release APK (arm64 only)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=darrovgo123 \
            -Pandroid.injected.signing.key.alias=darrovgo \
            -Pandroid.injected.signing.key.password=darrovgo123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarrovGo-release-arm64
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
